# Local Midnight v8 stack used by testkit's LocalTestEnvironment.
# testkit reads this file from process.cwd() and brings up its own
# node + indexer + proof-server on RANDOM host ports (TESTCONTAINERS_UID makes
# the container names unique), so this never clashes with other local stacks.
#
# Images are the public Docker Hub v8 tags. (The ghcr.io/midnight-ntwrk/* tags
# referenced elsewhere are access-gated; these are not.)
services:
  proof-server:
    image: 'midnightntwrk/proof-server:8.0.3'
    container_name: proof-server_$TESTCONTAINERS_UID
    command: ['midnight-proof-server -v']
    ports:
      - '6300'
    environment:
      RUST_BACKTRACE: 'full'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6300/version']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  indexer:
    image: 'midnightntwrk/indexer-standalone:latest'
    container_name: indexer_$TESTCONTAINERS_UID
    ports:
      - '8088'
    environment:
      RUST_LOG: 'indexer=info,info'
      APP__INFRA__NODE__URL: 'ws://node:9944'
      APP__APPLICATION__NETWORK_ID: 'undeployed'
      APP__INFRA__STORAGE__PASSWORD: 'indexer'
      APP__INFRA__PUB_SUB__PASSWORD: 'indexer'
      APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD: 'indexer'
      APP__INFRA__SECRET: '303132333435363738393031323334353637383930313233343536373839303132'
    healthcheck:
      test: ['CMD-SHELL', 'cat /var/run/indexer-standalone/running']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      node:
        condition: service_healthy

  node:
    image: 'midnightntwrk/midnight-node:0.22.2'
    container_name: node_$TESTCONTAINERS_UID
    ports:
      - '9944'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 20s
    environment:
      CFG_PRESET: 'dev'
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'
